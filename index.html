<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>凯凯的作业小助手 🌟</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --orange: #FF6B35;
    --blue: #4A90D9;
    --green: #52C41A;
    --yellow: #FFD700;
    --pink: #FF9BB5;
    --purple: #9B59B6;
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --text: #333333;
    --text-light: #888888;
    --border: #E8E8E8;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
    --radius: 20px;
    --radius-sm: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text);
    font-size: 18px;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    min-height: 100vh;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .screen.active { display: flex; flex-direction: column; }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: var(--orange); color: white; box-shadow: 0 4px 15px rgba(255,107,53,0.4); }
  .btn-primary:hover { background: #e85a26; }
  .btn-secondary { background: var(--blue); color: white; box-shadow: 0 4px 15px rgba(74,144,217,0.4); }
  .btn-success { background: var(--green); color: white; box-shadow: 0 4px 15px rgba(82,196,26,0.4); }
  .btn-outline { background: white; color: var(--orange); border: 2px solid var(--orange); }
  .btn-gray { background: #f0f0f0; color: #666; }
  .btn-block { width: 100%; display: flex; }
  .btn-lg { font-size: 22px; padding: 18px 36px; }
  .btn-sm { font-size: 15px; padding: 8px 18px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== INPUTS ===== */
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .input-group input, .input-group select {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 17px;
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }
  .input-group input:focus, .input-group select:focus { border-color: var(--orange); }

  /* ===== HEADER ===== */
  .screen-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .screen-title { font-size: 22px; font-weight: 800; }

  /* ===== ICON BUTTON ===== */
  .icon-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.05); }

  /* ===== STARS ===== */
  .stars-display {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 20px;
    font-weight: 700;
    color: var(--yellow);
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    background: #f0f0f0;
    border-radius: 50px;
    height: 12px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), #FF9B5E);
    border-radius: 50px;
    transition: width 0.5s ease;
  }

  /* ===== 田字格 GRID ===== */
  .tian-grid-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto;
  }
  .tian-grid {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 3px solid #CCCCCC;
    border-radius: 8px;
    background: #FFFDE7;
    pointer-events: none;
  }
  .tian-grid::before {
    content: '';
    position: absolute;
    left: 50%; top: 0;
    width: 1px; height: 100%;
    background: repeating-linear-gradient(to bottom, #CCC 0px, #CCC 4px, transparent 4px, transparent 8px);
    transform: translateX(-50%);
  }
  .tian-grid::after {
    content: '';
    position: absolute;
    top: 50%; left: 0;
    width: 100%; height: 1px;
    background: repeating-linear-gradient(to right, #CCC 0px, #CCC 4px, transparent 4px, transparent 8px);
    transform: translateY(-50%);
  }
  #hanzi-target {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ===== PINYIN ===== */
  .pinyin-display {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 3px;
    margin: 10px 0;
    min-height: 36px;
  }

  /* ===== AI SPEECH BUBBLE ===== */
  .speech-bubble {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 20px 20px 20px 4px;
    padding: 14px 18px;
    font-size: 17px;
    line-height: 1.5;
    position: relative;
    min-height: 54px;
    box-shadow: 0 4px 15px rgba(102,126,234,0.3);
  }
  .speech-bubble.speaking {
    animation: pulse-bubble 1s ease infinite;
  }
  @keyframes pulse-bubble {
    0%, 100% { box-shadow: 0 4px 15px rgba(102,126,234,0.3); }
    50% { box-shadow: 0 4px 25px rgba(102,126,234,0.6); }
  }
  .ai-avatar {
    font-size: 28px;
    margin-right: 8px;
  }
  .bubble-row {
    display: flex;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  /* ===== MIC BUTTON ===== */
  .mic-btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 16px 0;
  }
  .mic-btn {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--orange), #FF9B5E);
    color: white;
    font-size: 36px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,53,0.5);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .mic-btn:active, .mic-btn.recording {
    transform: scale(1.1);
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    box-shadow: 0 6px 30px rgba(231,76,60,0.6);
    animation: mic-pulse 0.8s ease infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 6px 30px rgba(231,76,60,0.6); }
    50% { box-shadow: 0 6px 50px rgba(231,76,60,0.9), 0 0 0 15px rgba(231,76,60,0.1); }
  }
  .mic-label {
    font-size: 14px;
    color: var(--text-light);
    margin-top: 8px;
    font-weight: 600;
  }

  /* ===== TIMER ===== */
  .timer-display {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 20px;
    font-weight: 700;
    color: var(--blue);
    background: rgba(74,144,217,0.1);
    padding: 6px 14px;
    border-radius: 50px;
  }

  /* ===== HINT BUTTONS ===== */
  .hint-section {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 10px 0;
    flex-wrap: wrap;
  }
  .hint-btn {
    padding: 10px 20px;
    background: rgba(155,89,182,0.1);
    color: var(--purple);
    border: 2px solid var(--purple);
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .hint-btn:hover, .hint-btn:active { background: var(--purple); color: white; }
  .hint-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .hint-used { background: #ddd; color: #999; border-color: #ddd; }

  /* ===== TASK INFO ===== */
  .task-info {
    text-align: center;
    padding: 12px;
    background: rgba(74,144,217,0.08);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
  }
  .task-type-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .badge-write { background: rgba(255,107,53,0.15); color: var(--orange); }
  .badge-vocab { background: rgba(74,144,217,0.15); color: var(--blue); }
  .task-desc { font-size: 17px; font-weight: 600; }

  /* ===== LOADING SPINNER ===== */
  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid rgba(255,107,53,0.2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 40px;
    color: var(--text-light);
    font-size: 17px;
  }

  /* ===== FIREWORKS ===== */
  #fireworks-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* ===== RESULTS ===== */
  .result-star-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    font-size: 40px;
    margin: 16px 0;
    animation: bounceIn 0.6s ease;
  }
  @keyframes bounceIn {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .result-card {
    background: white;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .result-char { font-size: 24px; font-weight: 800; }
  .result-stars { font-size: 22px; }

  /* ===== TASK LIST (REVIEW SCREEN) ===== */
  .task-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    background: white;
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  .task-list-item .char-big { font-size: 28px; font-weight: 800; min-width: 36px; }
  .task-list-item .task-meta { flex: 1; }
  .task-list-item .remove-btn {
    background: none; border: none; font-size: 20px; cursor: pointer; color: #ccc; padding: 4px;
  }
  .task-list-item .remove-btn:hover { color: #e74c3c; }
  .type-select {
    padding: 4px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: white;
  }

  /* ===== STARS BADGE ===== */
  .stars-badge {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: white;
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 20px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 12px rgba(255,165,0,0.4);
  }

  /* ===== CELEBRATION OVERLAY ===== */
  .celebration-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    animation: fadeIn 0.3s ease;
  }
  .celebration-card {
    background: white;
    border-radius: var(--radius);
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: bounceIn 0.5s ease;
  }
  .celebration-emoji { font-size: 60px; display: block; margin-bottom: 12px; }
  .celebration-msg { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .celebration-sub { font-size: 17px; color: var(--text-light); }

  /* ===== PHOTO PREVIEW ===== */
  #photo-preview {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 15px;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 99999;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== ANSWER INPUT ===== */
  .answer-input-wrap {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .answer-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  .answer-input:focus { border-color: var(--orange); }

  /* ===== WAVE ANIMATION FOR LISTENING ===== */
  .wave-wrap {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 30px;
    margin-top: 6px;
  }
  .wave-wrap.active { display: flex; }
  .wave-bar {
    width: 5px;
    background: var(--orange);
    border-radius: 3px;
    animation: wave-anim 0.8s ease infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; height: 10px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 20px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 15px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 25px; }
  .wave-bar:nth-child(5) { animation-delay: 0.2s; height: 18px; }
  .wave-bar:nth-child(6) { animation-delay: 0.1s; height: 12px; }
  @keyframes wave-anim {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1.5); }
  }

  /* ===== SCROLLABLE CONTENT ===== */
  .scroll-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ===== HOME SCREEN SPECIFICS ===== */
  .home-greeting {
    text-align: center;
    padding: 30px 20px;
  }
  .home-greeting .emoji-big { font-size: 72px; display: block; margin-bottom: 10px; }
  .home-greeting h1 { font-size: 26px; font-weight: 800; color: var(--orange); margin-bottom: 6px; }
  .home-greeting .date-text { font-size: 16px; color: var(--text-light); }

  /* ===== SETTINGS SCREEN ===== */
  .settings-hero {
    text-align: center;
    padding: 20px;
    margin-bottom: 10px;
  }
  .settings-hero .emoji-big { font-size: 56px; display: block; margin-bottom: 8px; }
  .settings-hero h2 { font-size: 22px; font-weight: 800; }

  /* ===== RESPONSIVE ADJUSTMENTS ===== */
  @media (max-width: 375px) {
    .btn-lg { font-size: 19px; padding: 15px 28px; }
    .tian-grid-wrap { width: 230px; height: 230px; }
  }

  /* ===== ANIMATE STARS ===== */
  .star-pop {
    display: inline-block;
    animation: starPop 0.4s ease;
  }
  @keyframes starPop {
    0% { transform: scale(0) rotate(-30deg); opacity: 0; }
    60% { transform: scale(1.4) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ===== GAME SCREEN LAYOUT ===== */
  #screen-game {
    padding: 12px;
  }
  .game-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .game-progress-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-light);
  }
  .game-main {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* hidden file input styled */
  #photo-input { display: none; }
  .photo-upload-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px;
    border: 3px dashed var(--orange);
    border-radius: var(--radius);
    cursor: pointer;
    background: rgba(255,107,53,0.04);
    transition: background 0.2s;
    color: var(--orange);
    font-size: 17px;
    font-weight: 700;
    min-height: 150px;
  }
  .photo-upload-label:hover { background: rgba(255,107,53,0.1); }
  .photo-upload-label .icon { font-size: 48px; }

  .photo-preview-wrap { position: relative; margin-bottom: 12px; }
  .photo-change-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- CANVAS FOR FIREWORKS -->
<canvas id="fireworks-canvas"></canvas>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===================== SCREEN 1: SETTINGS ===================== -->
<div class="screen" id="screen-settings">
  <div class="settings-hero">
    <span class="emoji-big">⚙️</span>
    <h2>作业助手设置</h2>
  </div>
  <div class="scroll-content">
    <div class="card">
      <div class="input-group">
        <label>🔑 OpenAI API Key</label>
        <input type="password" id="settings-api-key" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="input-group">
        <label>👧 小朋友的名字</label>
        <input type="text" id="settings-child-name" value="凯凯">
      </div>
      <div class="input-group">
        <label>🤖 AI 模型</label>
        <select id="settings-model">
          <option value="gpt-4o">GPT-4o（推荐）</option>
          <option value="gpt-4o-mini">GPT-4o-mini（更快）</option>
          <option value="gpt-4-turbo">GPT-4 Turbo</option>
        </select>
      </div>
      <div class="input-group">
        <label>🔊 语音速度</label>
        <select id="settings-voice-speed">
          <option value="0.8">慢速（适合初学）</option>
          <option value="1.0" selected>正常速度</option>
          <option value="1.2">快速</option>
        </select>
      </div>
    </div>
    <div style="padding-bottom: 30px;">
      <button class="btn btn-primary btn-block btn-lg" onclick="saveSettings()">
        💾 保存设置，出发！
      </button>
    </div>
  </div>
</div>

<!-- ===================== SCREEN 2: HOME ===================== -->
<div class="screen" id="screen-home">
  <div class="screen-header">
    <div class="stars-badge">
      ⭐ <span id="home-stars">0</span> 星
    </div>
    <button class="icon-btn" onclick="showScreen('screen-settings')">⚙️</button>
  </div>
  <div class="scroll-content">
    <div class="home-greeting">
      <span class="emoji-big">🌟</span>
      <h1 id="home-greeting-text">凯凯，今天的作业来啦！</h1>
      <div class="date-text" id="home-date"></div>
    </div>
    <div class="card" style="text-align:center; padding: 30px 20px;">
      <p style="font-size:17px; color: var(--text-light); margin-bottom: 20px;">
        📸 请爸爸妈妈帮忙拍下今天的作业
      </p>
      <label class="photo-upload-label" for="photo-input">
        <span class="icon">📷</span>
        拍照导入作业
      </label>
      <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="handlePhotoUpload(event)">
    </div>
    <div style="height: 20px;"></div>
  </div>
</div>

<!-- ===================== SCREEN 3: PHOTO REVIEW ===================== -->
<div class="screen" id="screen-review">
  <div class="screen-header">
    <button class="icon-btn" onclick="showScreen('screen-home')">◀ 返回</button>
    <span class="screen-title">识别作业</span>
    <div style="width:36px;"></div>
  </div>
  <div class="scroll-content">
    <!-- Photo preview -->
    <div class="photo-preview-wrap card" style="padding:10px;">
      <img id="photo-preview" src="" alt="作业照片">
      <button class="photo-change-btn" onclick="document.getElementById('photo-input-2').click()">更换图片</button>
      <input type="file" id="photo-input-2" style="display:none" accept="image/*" capture="environment" onchange="handlePhotoUpload(event)">
    </div>

    <!-- Loading / recognized tasks -->
    <div id="review-loading" class="loading-center">

<script>
// ============================================================
// STATE
// ============================================================
const App = {
  apiKey: '',
  childName: '凯凯',
  voiceSpeed: 1.0,
  model: 'gpt-4o',
  totalStars: 0,
  
  currentPhotoBase64: null,
  tasks: [], // [{char, type: 'write'|'vocab', pinyin}]
  currentTaskIndex: 0,
  currentHintLevel: 0, // 0=no hints, 1,2,3
  sessionStars: 0,
  taskResults: [],
  timerInterval: null,
  timerSeconds: 0,
  gameStartTime: null,
  
  hanziWriter: null,
  isRecording: false,
  mediaRecorder: null,
  audioChunks: [],
  audioStream: null,
  currentAudio: null,
  
  recognition: null,
  usingSpeechRecognition: false,
};

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  updateHomeDate();
  
  if (!App.apiKey) {
    showScreen('screen-settings');
  } else {
    showScreen('screen-home');
    updateHomeStars();
  }
  
  initFireworks();
  setupMicEvents();
});

function loadSettings() {
  App.apiKey = localStorage.getItem('apiKey') || '';
  App.childName = localStorage.getItem('childName') || '凯凯';
  App.voiceSpeed = parseFloat(localStorage.getItem('voiceSpeed') || '1.0');
  App.model = localStorage.getItem('model') || 'gpt-4o';
  App.totalStars = parseInt(localStorage.getItem('totalStars') || '0');
  
  // Prefill settings inputs
  const keyEl = document.getElementById('settings-api-key');
  if (keyEl && App.apiKey) keyEl.value = App.apiKey;
  const nameEl = document.getElementById('settings-child-name');
  if (nameEl) nameEl.value = App.childName;
  const speedEl = document.getElementById('settings-voice-speed');
  if (speedEl) speedEl.value = App.voiceSpeed.toString();
  const modelEl = document.getElementById('settings-model');
  if (modelEl) modelEl.value = App.model;
}

function saveSettings() {
  const key = document.getElementById('settings-api-key').value.trim();
  const name = document.getElementById('settings-child-name').value.trim() || '凯凯';
  const speed = document.getElementById('settings-voice-speed').value;
  const model = document.getElementById('settings-model').value;
  
  if (!key) {
    showToast('请输入 OpenAI API Key！');
    return;
  }
  
  App.apiKey = key;
  App.childName = name;
  App.voiceSpeed = parseFloat(speed);
  App.model = model;
  
  localStorage.setItem('apiKey', key);
  localStorage.setItem('childName', name);
  localStorage.setItem('voiceSpeed', speed);
  localStorage.setItem('model', model);
  
  showToast('设置已保存 ✅');
  updateHomeGreeting();
  updateHomeStars();
  showScreen('screen-home');
}

function updateHomeGreeting() {
  const el = document.getElementById('home-greeting-text');
  if (el) el.textContent = `${App.childName}，今天的作业来啦！`;
}

function updateHomeDate() {
  const el = document.getElementById('home-date');
  if (!el) return;
  const now = new Date();
  const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  el.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
  updateHomeGreeting();
}

function updateHomeStars() {
  const el = document.getElementById('home-stars');
  if (el) el.textContent = App.totalStars;
}

// ============================================================
// SCREEN NAVIGATION
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
}

// ============================================================
// PHOTO UPLOAD & GPT VISION
// ============================================================
async function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  // Convert to base64
  const base64 = await fileToBase64(file);
  App.currentPhotoBase64 = base64;
  
  // Show photo on review screen
  const preview = document.getElementById('photo-preview');
  preview.src = base64;
  
  // Navigate to review screen
  showScreen('screen-review');
  
  // Reset states
  document.getElementById('review-loading').style.display = 'flex';
  document.getElementById('review-tasks').style.display = 'none';
  document.getElementById('review-error').style.display = 'none';
  
  // Call GPT Vision
  await recognizeHomework(base64);
  
  // Reset file input
  event.target.value = '';
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function recognizeHomework(base64) {
  try {
    const mimeType = base64.split(';')[0].split(':')[1];
    const base64Data = base64.split(',')[1];
    
    const prompt = `你是一个中文小学作业识别助手。请分析这张作业图片，识别出需要：
1. 写字（写汉字）的任务：列出所有需要写的汉字
2. 组词的任务：列出所有需要组词的汉字

同时为每个汉字提供拼音。

请用以下JSON格式返回，只返回JSON，不要其他文字：
{
  "tasks": [
    {"char": "汉字", "type": "write", "pinyin": "hàn zì"},
    {"char": "汉字", "type": "vocab", "pinyin": "hàn zì"}
  ]
}

type只能是"write"（写字）或"vocab"（组词）。
如果图片中没有识别到明确的汉字作业任务，或图片不清晰，请返回：
{"tasks": [], "error": "无法识别，请重新拍照"}`;

    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${App.apiKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: App.model,
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: prompt },
            { type: 'image_url', image_url: { url: `data:${mimeType};base64,${base64Data}`, detail: 'high' } }
          ]
        }],
        max_tokens: 1000,
        temperature: 0.1,
      })
    });
    
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API Error ${response.status}`);
    }
    
    const data = await response.json();
    const content = data.choices[0].message.content.trim();
    
    // Parse JSON from response
    let parsed;
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      parsed = JSON.parse(jsonMatch[0]);
    } else {
      throw new Error('返回格式错误');
    }
    
    if (parsed.error) {
      throw new Error(parsed.error);
    }
    
    if (!parsed.tasks || parsed.tasks.length === 0) {
      throw new Error('没有识别到作业任务，请重新拍照或手动添加');
    }
    
    App.tasks = parsed.tasks;
    renderTaskList();
    document.getElementById('review-loading').style.display = 'none';
    document.getElementById('review-tasks').style.display = 'block';
    
  } catch (err) {
    console.error('Recognition error:', err);
    document.getElementById('review-loading').style.display = 'none';
    document.getElementById('review-error').style.display = 'block';
    document.getElementById('review-error-msg').textContent = err.message || '识别失败，请重试';
    
    // Offer demo mode if API fails
    if (err.message && (err.message.includes('API') || err.message.includes('auth') || err.message.includes('key'))) {
      App.tasks = getDemoTasks();
      renderTaskList();
      document.getElementById('review-error').style.display = 'none';
      document.getElementById('review-tasks').style.display = 'block';
      showToast('使用演示模式 📚');
    }
  }
}

function getDemoTasks() {
  return [
    { char: '山', type: 'write', pinyin: 'shān' },
    { char: '水', type: 'write', pinyin: 'shuǐ' },
    { char: '日', type: 'vocab', pinyin: 'rì' },
    { char: '月', type: 'vocab', pinyin: 'yuè' },
    { char: '木', type: 'write', pinyin: 'mù' },
  ];
}

function retryRecognition() {
  if (!App.currentPhotoBase64) {
    showScreen('screen-home');
    return;
  }
  document.getElementById('review-loading').style.display = 'flex';
  document.getElementById('review-error').style.display = 'none';
  recognizeHomework(App.currentPhotoBase64);
}

function renderTaskList() {
  const container = document.getElementById('task-list-container');
  container.innerHTML = '';
  
  App.tasks.forEach((task, i) => {
    const item = document.createElement('div');
    item.className = 'task-list-item';
    item.innerHTML = `
      <div class="char-big">${task.char}</div>
      <div class="task-meta">
        <div style="font-size:14px; color: var(--text-light);">${task.pinyin || ''}</div>
        <select class="type-select" onchange="App.tasks[${i}].type=this.value">
          <option value="write" ${task.type==='write'?'selected':''}>✏️ 写字</option>
          <option value="vocab" ${task.type==='vocab'?'selected':''}>📖 组词</option>
        </select>
      </div>
      <button class="remove-btn" onclick="removeTask(${i})">✕</button>
    `;
    container.appendChild(item);
  });
  
  const startBtn = document.getElementById('start-game-btn');
  startBtn.disabled = App.tasks.length === 0;
}

function removeTask(index) {
  App.tasks.splice(index, 1);
  renderTaskList();
}

function addTaskManually() {
  const char = prompt('请输入要添加的汉字（一个字）：');
  if (!char || !char.trim()) return;
  const c = char.trim()[0];
  const type = confirm(`"${c}" 是写字任务吗？\n确定=写字  取消=组词`) ? 'write' : 'vocab';
  App.tasks.push({ char: c, type, pinyin: '' });
  
  // Try to get pinyin for the new character
  getPinyinForChar(c).then(pinyin => {
    const t = App.tasks.find(t => t.char === c && !t.pinyin);
    if (t) t.pinyin = pinyin;
    renderTaskList();
  });
  
  renderTaskList();
}

async function getPinyinForChar(char) {
  try {
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${App.apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'user', content: `请给汉字"${char}"的拼音（带声调），只返回拼音字符串，例如：hàn` }],
        max_tokens: 20, temperature: 0
      })
    });
    const d = await resp.json();
    return d.choices?.[0]?.message?.content?.trim() || '';
  } catch { return ''; }
}

// ============================================================
// GAME START
// ============================================================
function startGame() {
  if (App.tasks.length === 0) { showToast('请至少添加一个任务！'); return; }
  
  App.currentTaskIndex = 0;
  App.sessionStars = 0;
  App.taskResults = [];
  App.timerSeconds = 0;
  App.gameStartTime = Date.now();
  
  // Update UI
  document.getElementById('q-total').textContent = App.tasks.length;
  document.getElementById('game-stars-display').textContent = '0';
  
  showScreen('screen-game');
  startTimer();
  loadQuestion(0);
}

function startTimer() {
  clearInterval(App.timerInterval);
  App.timerInterval = setInterval(() => {
    App.timerSeconds++;
    const m = Math.floor(App.timerSeconds / 60).toString().padStart(2, '0');
    const s = (App.timerSeconds % 60).toString().padStart(2, '0');
    document.getElementById('game-timer').textContent = `${m}:${s}`;
  }, 1000);
}

async function loadQuestion(index) {
  if (index >= App.tasks.length) {
    finishGame();
    return;
  }
  
  const task = App.tasks[index];
  App.currentHintLevel = 0;
  
  // Update progress
  document.getElementById('q-current').textContent = index + 1;
  const pct = (index / App.tasks.length) * 100;
  document.getElementById('game-progress-fill').style.width = pct + '%';
  
  // Update task info
  const badge = document.getElementById('task-type-badge');
  const desc = document.getElementById('task-description');
  if (task.type === 'write') {
    badge.textContent = '✏️ 写字';
    badge.className = 'task-type-badge badge-write';
    desc.textContent = `请认读这个字，说出它的名字`;
  } else {
    badge.textContent = '📖 组词';
    badge.className = 'task-type-badge badge-vocab';
    desc.textContent = `请用「${task.char}」组一个词语`;
  }
  
  // Pinyin
  document.getElementById('pinyin-display').textContent = task.pinyin || '—';
  
  // Clear answer input
  document.getElementById('answer-input').value = '';
  
  // Reset hint button
  const hintBtn = document.getElementById('hint-btn');
  hintBtn.disabled = false;
  hintBtn.className = 'hint-btn';
  hintBtn.textContent = '🆘 帮帮我';
  
  // Render Hanzi Writer
  renderHanziWriter(task.char);
  
  // AI greeting for this question
  const greeting = task.type === 'write'
    ? `来看这个字！${task.pinyin ? '拼音是 ' + task.pinyin + '，' : ''}大声读出来吧！😊`
    : `请用「${task.char}」（${task.pinyin || ''}）组一个词，说出来吧！📚`;
  
  setAISpeech(greeting);
  await speak(greeting);
}

function renderHanziWriter(char) {
  const target = document.getElementById('hanzi-target');
  target.innerHTML = '';
  
  if (App.hanziWriter) {
    try { App.hanziWriter = null; } catch(e) {}
  }
  
  try {
    App.hanziWriter = HanziWriter.create('hanzi-target', char, {
      width: 240,
      height: 240,
      padding: 10,
      showCharacter: true,
      showOutline: true,
      strokeColor: '#4A90D9',
      outlineColor: '#DDDDDD',
      drawingColor: '#FF6B35',
      animationSpeed: 0.8,
      delayBetweenStrokes: 300,
      strokeAnimationSpeed: 1,
    });
  } catch(e) {
    console.warn('HanziWriter error:', e);
    // Fallback: show character as text
    target.style.display = 'flex';
    target.style.alignItems = 'center';
    target.style.justifyContent = 'center';
    target.innerHTML = `<span style="font-size:160px; color:#4A90D9; font-weight:900;">${char}</span>`;
  }
}

// ============================================================
// HINT SYSTEM
// ============================================================
async function useHint() {
  const task = App.tasks[App.currentTaskIndex];
  App.currentHintLevel++;
  
  const hintBtn = document.getElementById('hint-btn');
  
  if (App.currentHintLevel === 1) {
    // Get stroke count and radical via GPT
    hintBtn.textContent = '🆘 帮帮我 (2)';
    try {
      const resp = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${App.apiKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [{
            role: 'user',
            content: `请用简单易懂的语言（适合8岁小朋友），描述汉字"${task.char}"的笔画数量和主要部件/偏旁。用鼓励的语气，一句话以内。用中文。`
          }],
          max_tokens: 80, temperature: 0.7
        })
      });
      const d = await resp.json();
      const hint = d.choices?.[0]?.message?.content || `提示一下：这个字要仔细看哦！`;
      setAISpeech(`💡 提示一：${hint}`);
      await speak(hint);
    } catch {
      const msg = `提示一下：这个字叫"${task.char}"，认真看看吧～`;
      setAISpeech(`💡 ${msg}`);
      await speak(msg);
    }
    
  } else if (App.currentHintLevel === 2) {
    // Animate strokes
    hintBtn.textContent = '🆘 帮帮我 (3)';
    const msg = `来，我们一笔一笔地看～`;
    setAISpeech(`✍️ ${msg}`);
    await speak(msg);
    
    if (App.hanziWriter) {
      try {
        App.hanziWriter.animateCharacter({
          onComplete: () => {
            const done = `看好了吗？你来试试！`;
            setAISpeech(done);
            speak(done);
          }
        });
      } catch(e) { console.warn('Animation error:', e); }
    }
    
  } else if (App.currentHintLevel >= 3) {
    // Show full answer
    hintBtn.disabled = true;
    hintBtn.className = 'hint-btn hint-used';
    hintBtn.textContent = '✅ 已看答案';
    
    let msg;
    if (task.type === 'write') {
      msg = `没关系！这个字就是「${task.char}」，读作 ${task.pinyin || task.char}，我们一起读一遍～`;
    } else {
      // Get vocab example
      try {
        const resp = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${App.apiKey}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [{
              role: 'user',
              content: `用汉字"${task.char}"组一个简单的词语，适合小学生。只返回这个词语，不要其他文字。`
            }],
            max_tokens: 20, temperature: 0.5
          })
        });
        const d = await resp.json();
        const word = d.choices?.[0]?.message?.content?.trim() || `${task.char}字`;
        msg = `没关系！「${task.char}」可以组词「${word}」，跟我读一遍！`;
        document.getElementById('answer-input').value = word;
      } catch {
        msg = `没关系！认真看看「${task.char}」，你一定能组出词来的！`;
      }
    }
    
    setAISpeech(`📖 ${msg}`);
    await speak(msg);
    
    // Auto advance after 3 seconds
    setTimeout(() => {
      recordResult(0, false); // 0 stars for seeing answer
      advanceQuestion();
    }, 4000);
  }
}

// ============================================================
// VOICE RECORDING
// ============================================================
function setupMicEvents() {
  // Prevent context menu on long press
  const micBtn = document.getElementById('mic-btn');
  micBtn.addEventListener('contextmenu', e => e.preventDefault());
}

async function startRecording(event) {
  event.preventDefault();
  if (App.isRecording) return;
  App.isRecording = true;
  
  const micBtn = document.getElementById('mic-btn');
  const micLabel = document.getElementById('mic-label');
  const waveWrap = document.getElementById('wave-wrap');
  
  micBtn.classList.add('recording');
  micLabel.textContent = '正在录音...';
  waveWrap.classList.add('active');
  
  // Try Web Speech API first (better for real-time on mobile)
  if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
    startSpeechRecognition();
    return;
  }
  
  // Fallback to MediaRecorder
  try {
    App.audioChunks = [];
    App.audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    App.mediaRecorder = new MediaRecorder(App.audioStream);
    App.mediaRecorder.ondataavailable = e => App.audioChunks.push(e.data);
    App.mediaRecorder.start();
  } catch(err) {
    console.error('Mic error:', err);
    showToast('麦克风权限被拒绝，请使用文字输入');
    stopRecordingUI();
    App.isRecording = false;
  }
}

function startSpeechRecognition() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  App.recognition = new SpeechRec();
  App.recognition.lang = 'zh-CN';
  App.recognition.continuous = false;
  App.recognition.interimResults = false;
  App.recognition.maxAlternatives = 3;
  App.usingSpeechRecognition = true;
  
  App.recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    stopRecordingUI();
    App.isRecording = false;
    processAnswer(transcript);
  };
  
  App.recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    stopRecordingUI();
    App.isRecording = false;
    if (event.error !== 'aborted') {
      showToast('语音识别失败，请使用文字输入');
    }
  };
  
  App.recognition.onend = () => {
    stopRecordingUI();
    App.isRecording = false;
  };
  
  App.recognition.start();
}

async function stopRecording(event) {
  event.preventDefault();
  if (!App.isRecording) return;
  
  if (App.usingSpeechRecognition) {
    if (App.recognition) {
      try { App.recognition.stop(); } catch(e) {}
    }
    App.usingSpeechRecognition = false;
    stopRecordingUI();
    App.isRecording = false;
    return;
  }
  
  stopRecordingUI();
  App.isRecording = false;
  
  if (!App.mediaRecorder || App.mediaRecorder.state !== 'recording') return;
  
  App.mediaRecorder.stop();
  
  App.mediaRecorder.onstop = async () => {
    // Stop mic stream
    if (App.audioStream) {
      App.audioStream.getTracks().forEach(t => t.stop());
    }
    
    const blob = new Blob(App.audioChunks, { type: 'audio/webm' });
    
    // Try Whisper STT
    try {
      const text = await transcribeAudio(blob);
      if (text) processAnswer(text);
    } catch(err) {
      console.error('STT error:', err);
      showToast('语音识别失败，请使用文字输入');
    }
  };
}

function stopRecordingUI() {
  const micBtn = document.getElementById('mic-btn');
  const micLabel = document.getElementById('mic-label');
  const waveWrap = document.getElementById('wave-wrap');
  micBtn.classList.remove('recording');
  micLabel.textContent = '按住说话';
  waveWrap.classList.remove('active');
}

async function transcribeAudio(blob) {
  const formData = new FormData();
  formData.append('file', blob, 'audio.webm');
  formData.append('model', 'whisper-1');
  formData.append('language', 'zh');
  
  const response = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${App.apiKey}` },
    body: formData
  });
  
  if (!response.ok) throw new Error('Whisper API failed');
  const data = await response.json();
  return data.text?.trim() || '';
}

function submitTextAnswer() {
  const val = document.getElementById('answer-input').value.trim();
  if (!val) { showToast('请先输入答案'); return; }
  processAnswer(val);
}

// ============================================================
// ANSWER PROCESSING
// ============================================================
async function processAnswer(answer) {
  const task = App.tasks[App.currentTaskIndex];
  
  setAISpeech(`🎙️ 我听到你说：「${answer}」，让我想想...`);
  
  let isCorrect = false;
  let feedback = '';
  let starsEarned = 0;
  
  try {
    // Use GPT to evaluate answer
    const evalPrompt = task.type === 'write'
      ? `小朋友在学"${task.char}"（拼音：${task.pinyin || ''}），她回答说："${answer}"。判断她是否正确读出了这个字（允许方言发音差异，宽松判断）。返回JSON：{"correct": true/false, "feedback": "给小朋友的鼓励评语，用中文，15字以内，活泼可爱"}`
      : `小朋友在用"${task.char}"组词，她回答说："${answer}"。判断这个词语是否合理、包含"${task.char}"字，且是小学生常见词汇。返回JSON：{"correct": true/false, "feedback": "给小朋友的评语，用中文，15字以内"}`;
    
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${App.apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'user', content: evalPrompt }],
        max_tokens: 100, temperature: 0.3
      })
    });
    
    const d = await resp.json();
    const content = d.choices?.[0]?.message?.content || '';
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      const parsed = JSON.parse(jsonMatch[0]);
      isCorrect = parsed.correct;
      feedback = parsed.feedback || '';
    }
  } catch {
    // Fallback: simple check
    isCorrect = answer.includes(task.char) || answer.toLowerCase().includes((task.pinyin || '').replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/g, '').toLowerCase());
    feedback = isCorrect ? '太棒了！' : '再想想看哦～';
  }
  
  // Calculate stars
  if (isCorrect) {
    if (App.currentHintLevel === 0) starsEarned = 3;
    else if (App.currentHintLevel === 1) starsEarned = 2;
    else if (App.currentHintLevel === 2) starsEarned = 1;
    else starsEarned = 0;
  } else {
    starsEarned = 0;
  }
  
  // Build response message
  let msg = '';
  if (isCorrect) {
    const starsStr = '⭐'.repeat(starsEarned);
    msg = `${App.childName}太厉害了！${starsStr} ${feedback || '继续加油！'}`;
  } else {
    msg = `再想想看，${feedback || '这个字还有点难，没关系哦～'} 💪`;
  }
  
  setAISpeech(msg);
  await speak(msg);
  
  if (isCorrect) {
    recordResult(starsEarned, true);
    showCelebration(starsEarned);
    
    setTimeout(() => {
      hideCelebration();
      advanceQuestion();
    }, 2000);
  } else {
    // Wrong answer - let them try again or use hint
    if (App.currentHintLevel >= 3) {
      recordResult(0, false);
      setTimeout(() => advanceQuestion(), 3000);
    }
    // Otherwise let them keep trying
  }
}

function recordResult(stars, correct) {
  const task = App.tasks[App.currentTaskIndex];
  App.taskResults.push({
    char: task.char,
    pinyin: task.pinyin,
    type: task.type,
    stars,
    hints: App.currentHintLevel,
    correct
  });
  App.sessionStars += stars;
  document.getElementById('game-stars-display').textContent = App.sessionStars;
}

function advanceQuestion() {
  hideCelebration();
  App.currentTaskIndex++;
  if (App.currentTaskIndex >= App.tasks.length) {
    finishGame();
  } else {
    loadQuestion(App.currentTaskIndex);
  }
}

function skipQuestion() {
  recordResult(0, false);
  advanceQuestion();
}

// ============================================================
// CELEBRATION
// ============================================================
function showCelebration(stars) {
  const overlay = document.getElementById('celebration-overlay');
  const emoji = document.getElementById('celebration-emoji');
  const msg = document.getElementById('celebration-msg');
  const sub = document.getElementById('celebration-sub');
  
  if (stars === 3) {
    emoji.textContent = '🌟';
    msg.textContent = `${App.childName}太厉害了！`;
    sub.textContent = '满分！三颗星！⭐⭐⭐';
    launchFireworks(5000);
  } else if (stars === 2) {
    emoji.textContent = '😄';
    msg.textContent = '答对了！';
    sub.textContent = '获得两颗星！⭐⭐';
    launchFireworks(2000);
  } else if (stars === 1) {
    emoji.textContent = '😊';
    msg.textContent = '很努力！';
    sub.textContent = '获得一颗星！⭐';
  } else {
    emoji.textContent = '💪';
    msg.textContent = '没关系，继续加油！';
    sub.textContent = '下次会更好的！';
  }
  
  overlay.style.display = 'flex';
}

function hideCelebration() {
  document.getElementById('celebration-overlay').style.display = 'none';
}

// ============================================================
// FINISH GAME
// ============================================================
function finishGame() {
  clearInterval(App.timerInterval);
  
  const totalTime = App.timerSeconds;
  const m = Math.floor(totalTime / 60);
  const s = totalTime % 60;
  
  // Speed bonus: if completed in under (tasks * 30) seconds, +20%
  const timeLimit = App.tasks.length * 30;
  let finalStars = App.sessionStars;
  let speedBonus = false;
  if (totalTime < timeLimit && App.sessionStars > 0) {
    finalStars = Math.ceil(App.sessionStars * 1.2);
    speedBonus = true;
  }
  
  // Update total stars
  App.totalStars += finalStars;
  localStorage.setItem('totalStars', App.totalStars.toString());
  
  // Build results screen
  document.getElementById('result-total-stars').textContent = finalStars;
  document.getElementById('result-time-display').textContent = `用时 ${m}:${s.toString().padStart(2,'0')}${speedBonus ? ' 🚀 速度加成 +20%！' : ''}`;
  
  // Star display
  const starsRow = document.getElementById('result-stars-row');
  starsRow.innerHTML = '';
  const maxPossible = App.tasks.length * 3;
  const starPct = finalStars / maxPossible;
  if (starPct >= 0.9) {
    starsRow.innerHTML = '⭐⭐⭐';
  } else if (starPct >= 0.6) {
    starsRow.innerHTML = '⭐⭐';
  } else if (starPct >= 0.3) {
    starsRow.innerHTML = '⭐';
  } else {
    starsRow.innerHTML = '💪';
  }
  
  // Title
  const titleEl = document.getElementById('result-title');
  if (starPct >= 0.8) {
    titleEl.textContent = `${App.childName}真棒！太优秀了！🎉`;
  } else if (starPct >= 0.5) {
    titleEl.textContent = `${App.childName}做得很好！继续加油！😊`;
  } else {
    titleEl.textContent = `${App.childName}很努力！下次会更好！💪`;
  }
  
  // Breakdown
  const breakdown = document.getElementById('result-breakdown');
  breakdown.innerHTML = App.taskResults.map(r => `
    <div class="result-card">
      <div>
        <div class="result-char">${r.char}</div>
        <div style="font-size:13px; color:var(--text-light);">${r.type === 'write' ? '写字' : '组词'} · 提示${r.hints}次</div>
      </div>
      <div class="result-stars">${r.stars === 3 ? '⭐⭐⭐' : r.stars === 2 ? '⭐⭐' : r.stars === 1 ? '⭐' : '💪'}</div>
    </div>
  `).join('');
  
  showScreen('screen-results');
  launchFireworks(8000);
  
  // Speak congratulations
  const congrats = starPct >= 0.8 
    ? `${App.childName}今天表现太棒了！一共获得了${finalStars}颗星！为你骄傲！`
    : `${App.childName}很努力！获得了${finalStars}颗星！继续加油！`;
  setTimeout(() => speak(congrats), 500);
}

function goHome() {
  stopFireworks();
  showScreen('screen-home');
  updateHomeStars();
}

function retryGame() {
  stopFireworks();
  App.currentTaskIndex = 0;
  App.sessionStars = 0;
  App.taskResults = [];
  App.timerSeconds = 0;
  App.gameStartTime = Date.now();
  document.getElementById('game-stars-display').textContent = '0';
  showScreen('screen-game');
  startTimer();
  loadQuestion(0);
}

// ============================================================
// TEXT TO SPEECH
// ============================================================
async function speak(text) {
  // Stop any current audio
  if (App.currentAudio) {
    App.currentAudio.pause();
    App.currentAudio = null;
  }
  
  const bubble = document.getElementById('ai-speech-bubble');
  bubble.classList.add('speaking');
  
  // Try OpenAI TTS first
  if (App.apiKey) {
    try {
      const resp = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${App.apiKey}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: 'tts-1',
          input: text,
          voice: 'shimmer',
          speed: App.voiceSpeed,
        })
      });
      
      if (resp.ok) {
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        App.currentAudio = audio;
        
        return new Promise((resolve) => {
          audio.onended = () => {
            URL.revokeObjectURL(url);
            bubble.classList.remove('speaking');
            App.currentAudio = null;
            resolve();
          };
          audio.onerror = () => {
            bubble.classList.remove('speaking');
            resolve();
          };
          audio.play().catch(() => {
            bubble.classList.remove('speaking');
            resolve();
          });
        });
      }
    } catch(err) {
      console.warn('TTS failed, using browser speech:', err);
    }
  }
  
  // Fallback: Web Speech API
  return new Promise((resolve) => {
    if ('speechSynthesis' in window) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = App.voiceSpeed;
      utterance.pitch = 1.1;
      
      // Try to find a Chinese voice
      const voices = speechSynthesis.getVoices();
      const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('CN'));
      if (zhVoice) utterance.voice = zhVoice;
      
      utterance.onend = () => { bubble.classList.remove('speaking'); resolve(); };
      utterance.onerror = () => { bubble.classList.remove('speaking'); resolve(); };
      
      speechSynthesis.speak(utterance);
    } else {
      bubble.classList.remove('speaking');
      resolve();
    }
  });
}

function setAISpeech(text) {
  const bubble = document.getElementById('ai-speech-bubble');
  bubble.textContent = text;
}

// ============================================================
// FIREWORKS
// ============================================================
const FW = {
  canvas: null,
  ctx: null,
  particles: [],
  running: false,
  rafId: null,
  stopTimer: null,
};

function initFireworks() {
  FW.canvas = document.getElementById('fireworks-canvas');
  FW.ctx = FW.canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  FW.canvas.width = window.innerWidth;
  FW.canvas.height = window.innerHeight;
}

function launchFireworks(duration = 3000) {
  FW.running = true;
  if (FW.stopTimer) clearTimeout(FW.stopTimer);
  FW.stopTimer = setTimeout(stopFireworks, duration);
  
  if (!FW.rafId) animateFireworks();
  launchBurst();
  
  // Keep launching bursts
  FW.burstInterval = setInterval(() => {
    if (FW.running) launchBurst();
    else clearInterval(FW.burstInterval);
  }, 600);
}

function launchBurst() {
  const x = Math.random() * FW.canvas.width;
  const y = Math.random() * FW.canvas.height * 0.6;
  const colors = ['#FF6B35','#FFD700','#4A90D9','#52C41A','#FF9BB5','#9B59B6','#00CED1'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const count = 30 + Math.floor(Math.random() * 20);
  
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    FW.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      color,
      size: 2 + Math.random() * 3,
      decay: 0.012 + Math.random() * 0.01,
    });
  }
}

function animateFireworks() {
  FW.ctx.clearRect(0, 0, FW.canvas.width, FW.canvas.height);
  
  FW.particles = FW.particles.filter(p => p.alpha > 0.05);
  
  FW.particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.vx *= 0.98;
    p.alpha -= p.decay;
    
    FW.ctx.save();
    FW.ctx.globalAlpha = Math.max(0, p.alpha);
    FW.ctx.fillStyle = p.color;
    FW.ctx.beginPath();
    FW.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    FW.ctx.fill();
    FW.ctx.restore();
  });
  
  if (FW.running || FW.particles.length > 0) {
    FW.rafId = requestAnimationFrame(animateFireworks);
  } else {
    FW.rafId = null;
    FW.ctx.clearRect(0, 0, FW.canvas.width, FW.canvas.height);
  }
}

function stopFireworks() {
  FW.running = false;
  if (FW.burstInterval) clearInterval(FW.burstInterval);
}

  toast.classList.add('show');

  toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
}
